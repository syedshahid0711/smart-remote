<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Add Device</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0B0620;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
    .app{max-width:480px;margin:0 auto}
    .phdr{display:flex;align-items:center;gap:12px;padding:16px 20px;background:#0F0826;border-bottom:1px solid #2D1B69;position:sticky;top:0;z-index:100}
    .bbtn{width:40px;height:40px;border-radius:12px;background:#1A1040;border:1px solid #2D1B69;display:flex;align-items:center;justify-content:center;color:#7B6BA5;cursor:pointer}
    .bbtn svg{width:18px;height:18px}
    .ptitle{font-size:16px;font-weight:700}
    .psub{font-size:11px;color:#7B6BA5}
    .mc{padding:20px}
    /* Steps indicator */
    .steps{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px}
    .step-dot{width:10px;height:10px;border-radius:50%;background:#1A1040;border:2px solid #2D1B69}
    .step-dot.active{background:#4D79FF;border-color:#4D79FF;box-shadow:0 0 8px rgba(77,121,255,0.4)}
    .step-dot.done{background:#A555EC;border-color:#A555EC}
    .step-line{width:30px;height:2px;background:#2D1B69}
    .step-line.done{background:#A555EC}
    /* Section */
    .sec-title{font-size:14px;font-weight:700;margin-bottom:16px;color:#CDBEEF}
    .sec-sub{font-size:12px;color:#7B6BA5;margin-bottom:16px}
    /* Type Grid */
    .type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .type-card{background:#130D2B;border:1px solid #2D1B69;border-radius:16px;padding:20px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:0.2s}
    .type-card:active{transform:scale(0.95)}
    .type-card.selected{border-color:#4D79FF;background:rgba(77,121,255,0.1);box-shadow:0 0 15px rgba(77,121,255,0.2)}
    .type-ico{font-size:28px}
    .type-name{font-size:11px;color:#CDBEEF;text-align:center}
    /* Brand List */
    .search-box{width:100%;padding:12px 16px;background:#130D2B;border:1px solid #2D1B69;border-radius:12px;color:#fff;font-size:14px;margin-bottom:16px;outline:none}
    .search-box::placeholder{color:#7B6BA5}
    .search-box:focus{border-color:#4D79FF}
    .brand-list{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto}
    .brand-item{display:flex;align-items:center;justify-content:space-between;background:#130D2B;border:1px solid #2D1B69;border-radius:12px;padding:14px 16px;cursor:pointer;transition:0.2s}
    .brand-item:active{transform:scale(0.98)}
    .brand-item.selected{border-color:#4D79FF;background:rgba(77,121,255,0.1)}
    .brand-name{font-size:14px;font-weight:600}
    .brand-arrow{color:#7B6BA5;font-size:16px}
    /* Test Step */
    .test-card{background:#130D2B;border:1px solid #2D1B69;border-radius:20px;padding:30px 20px;text-align:center}
    .test-icon{font-size:48px;margin-bottom:16px}
    .test-title{font-size:16px;font-weight:700;margin-bottom:8px}
    .test-sub{font-size:12px;color:#7B6BA5;margin-bottom:24px;line-height:1.5}
    .test-btn{width:100%;padding:14px;border-radius:25px;border:none;background:linear-gradient(90deg,#4D79FF,#A555EC);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 15px rgba(77,121,255,0.3)}
    .test-btn:active{transform:scale(0.97)}
    .test-btn.secondary{background:#1A1040;border:1px solid #2D1B69;box-shadow:none;color:#7B6BA5}
    .test-btn.green{background:linear-gradient(90deg,#00C853,#00E676);box-shadow:0 4px 15px rgba(0,200,83,0.3)}
    /* Name Input */
    .name-input{width:100%;padding:14px 16px;background:#130D2B;border:1px solid #2D1B69;border-radius:12px;color:#fff;font-size:16px;margin-bottom:16px;outline:none;text-align:center}
    .name-input:focus{border-color:#4D79FF}
    /* Hidden sections */
    .wizard-step{display:none}
    .wizard-step.active{display:block}
    /* Toast */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(165,85,236,0.9);padding:10px 24px;border-radius:25px;font-size:13px;font-weight:600;z-index:1000;color:#fff}
    .toast.hidden{display:none}
  </style>
</head>
<body>
<div class="app">
  <div class="phdr">
    <button class="bbtn" onclick="goBack()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button>
    <div><div class="ptitle">Add Device</div><div class="psub" id="step-label">Select device type</div></div>
  </div>

  <div class="mc">
    <!-- Step Indicators -->
    <div class="steps">
      <div class="step-dot active" id="sd1"></div>
      <div class="step-line" id="sl1"></div>
      <div class="step-dot" id="sd2"></div>
      <div class="step-line" id="sl2"></div>
      <div class="step-dot" id="sd3"></div>
      <div class="step-line" id="sl3"></div>
      <div class="step-dot" id="sd4"></div>
    </div>

    <!-- STEP 1: Select Type -->
    <div class="wizard-step active" id="step1">
      <div class="sec-title">What device do you want to add?</div>
      <div class="type-grid" id="type-grid"></div>
    </div>

    <!-- STEP 2: Select Brand -->
    <div class="wizard-step" id="step2">
      <div class="sec-title" id="brand-heading">Select Brand</div>
      <input type="text" class="search-box" id="brand-search" placeholder="🔍 Search brand..." oninput="filterBrands()"/>
      <div class="brand-list" id="brand-list"></div>
    </div>

    <!-- STEP 3: Test -->
    <div class="wizard-step" id="step3">
      <div class="test-card">
        <div class="test-icon" id="test-icon">📺</div>
        <div class="test-title">Test Your Device</div>
        <div class="test-sub">Point your phone at the device and tap the button below. The app will send a <b>Power</b> signal.</div>
        <button class="test-btn" onclick="sendTestSignal()">📡 Send Test Signal</button>
        <button class="test-btn green" onclick="testWorked()">✅ It Worked!</button>
        <button class="test-btn secondary" onclick="testFailed()">❌ Try Different Code</button>
      </div>
    </div>

    <!-- STEP 4: Name & Save -->
    <div class="wizard-step" id="step4">
      <div class="test-card">
        <div class="test-icon">✨</div>
        <div class="test-title">Name Your Device</div>
        <div class="test-sub">Give a custom name for your device (e.g., "Bedroom TV", "Living Room AC")</div>
        <input type="text" class="name-input" id="device-name" placeholder="My Device"/>
        <button class="test-btn green" onclick="saveDevice()">💾 Save Device</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<script src="../data/ir-codes.js"></script>
<script>
var selectedType = null;
var selectedBrand = null;
var currentStep = 1;

// Init: render type grid
function init() {
  var grid = document.getElementById('type-grid');
  grid.innerHTML = '';
  IR_DB.types.forEach(function(t) {
    var div = document.createElement('div');
    div.className = 'type-card';
    div.innerHTML = '<div class="type-ico">' + t.icon + '</div><div class="type-name">' + t.name + '</div>';
    div.onclick = function() { selectType(t); };
    grid.appendChild(div);
  });
}

function selectType(t) {
  selectedType = t;
  // Highlight
  document.querySelectorAll('.type-card').forEach(function(c){c.classList.remove('selected')});
  event.currentTarget.classList.add('selected');
  // Go to step 2 after short delay
  setTimeout(function(){ goToStep(2); }, 300);
}

function renderBrands() {
  var list = document.getElementById('brand-list');
  var brands = IR_DB.brands[selectedType.id] || [];
  document.getElementById('brand-heading').textContent = 'Select ' + selectedType.name + ' Brand';
  list.innerHTML = '';
  brands.forEach(function(b) {
    var div = document.createElement('div');
    div.className = 'brand-item';
    div.innerHTML = '<span class="brand-name">' + b.name + '</span><span class="brand-arrow">›</span>';
    div.onclick = function() { selectBrand(b); };
    div.setAttribute('data-name', b.name.toLowerCase());
    list.appendChild(div);
  });
}

function filterBrands() {
  var q = document.getElementById('brand-search').value.toLowerCase();
  document.querySelectorAll('.brand-item').forEach(function(item) {
    var name = item.getAttribute('data-name');
    item.style.display = name.indexOf(q) >= 0 ? 'flex' : 'none';
  });
}

function selectBrand(b) {
  selectedBrand = b;
  document.querySelectorAll('.brand-item').forEach(function(c){c.classList.remove('selected')});
  event.currentTarget.classList.add('selected');
  setTimeout(function(){ goToStep(3); }, 300);
}

function sendTestSignal() {
  showToast('📡 Sending IR signal...');
  // Try to blast power code
  if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.IRBlaster) {
    var code = getPowerCode();
    if (code) {
      var pattern = getPattern(code);
      window.Capacitor.Plugins.IRBlaster.transmit({frequency:38000, pattern:pattern})
      .then(function(){showToast('✅ Signal sent!')})
      .catch(function(e){showToast('❌ IR Failed: '+e.message)});
    }
  } else {
    showToast('IR Blaster not available (test mode)');
  }
}

function getPowerCode() {
  var type = selectedType.id;
  var brand = selectedBrand.id;
  if (type === 'ac') {
    var acData = IR_DB.ac[brand];
    return acData ? acData.offCmd : null;
  }
  var db = IR_DB[type];
  if (db && db[brand]) return db[brand].power;
  return null;
}

function getPattern(code) {
  var type = selectedType.id;
  var brand = selectedBrand.id;
  if (type === 'ac') {
    var acData = IR_DB.ac[brand];
    if (!acData) return IR_DB.necToPattern(code);
    var bits = code.toString(2).padStart(28,'0');
    var p = [acData.hdr, acData.hdrS];
    for(var i=0;i<bits.length;i++){p.push(acData.bit);p.push(bits[i]==='1'?acData.oneS:acData.zeroS);}
    p.push(acData.bit);p.push(10000);
    return p;
  }
  return IR_DB.necToPattern(code);
}

function testWorked() {
  showToast('✅ Great! Device confirmed.');
  document.getElementById('device-name').value = selectedBrand.name + ' ' + selectedType.name;
  setTimeout(function(){ goToStep(4); }, 400);
}

function testFailed() {
  showToast('Try pointing closer to the device and tap again');
}

function saveDevice() {
  var name = document.getElementById('device-name').value.trim();
  if (!name) { showToast('Please enter a name'); return; }

  var devices = JSON.parse(localStorage.getItem('smartnova_devices') || '[]');
  var device = {
    id: 'dev_' + Date.now(),
    type: selectedType.id,
    typeIcon: selectedType.icon,
    typeName: selectedType.name,
    brand: selectedBrand.id,
    brandName: selectedBrand.name,
    name: name,
    on: false,
    addedAt: new Date().toISOString()
  };
  devices.push(device);
  localStorage.setItem('smartnova_devices', JSON.stringify(devices));
  showToast('✅ ' + name + ' added!');
  setTimeout(function(){ window.location.href = '../index.html'; }, 1000);
}

function goToStep(step) {
  currentStep = step;
  document.querySelectorAll('.wizard-step').forEach(function(s){s.classList.remove('active')});
  document.getElementById('step' + step).classList.add('active');
  // Update dots
  for(var i=1;i<=4;i++){
    var dot = document.getElementById('sd'+i);
    var line = document.getElementById('sl'+(i-1));
    dot.className = 'step-dot' + (i<step?' done':'') + (i===step?' active':'');
    if(line) line.className = 'step-line' + (i<=step?' done':'');
  }
  // Labels
  var labels = ['','Select device type','Select brand','Test device','Name your device'];
  document.getElementById('step-label').textContent = labels[step];
  // Render brands on step 2
  if (step === 2) renderBrands();
  if (step === 3) document.getElementById('test-icon').textContent = selectedType.icon;
}

function goBack() {
  if (currentStep > 1) goToStep(currentStep - 1);
  else history.back();
}

function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.className='toast';clearTimeout(t._t);t._t=setTimeout(function(){t.className='toast hidden'},2500)}

init();
</script>
</body>
</html>
